name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  test:
    name: Tests & Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: contact
        run: flutter pub get

      - name: Analyze
        working-directory: contact
        run: flutter analyze

      - name: Test
        working-directory: contact
        run: flutter test

  build-android-debug:
    name: Android Debug APK
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: contact
        run: flutter pub get

      - name: Build APK (debug)
        working-directory: contact
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: contact-debug-${{ github.sha }}
          path: contact/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
